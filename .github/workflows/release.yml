name: Release (PyPI)

# Builds the sdist + wheel and publishes to PyPI via an OIDC trusted publisher
# (no stored token). The trusted publisher is registered on https://pypi.org for
# the `jomkz/second-brain-joplin` repo, workflow `release.yml`, environment
# `pypi`. See docs/releasing.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Validate metadata
        run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
