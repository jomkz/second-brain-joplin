name: Release (PyPI)

# Runs the full check suite (lint, type-check, test matrix, build) on the tagged
# commit, then publishes the *tested* artifact to PyPI via an OIDC trusted
# publisher (no stored token). The trusted publisher is registered on
# https://pypi.org for the `jomkz/second-brain-joplin` repo, environment `pypi`.
# A red check blocks the publish. See docs/releasing.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  publish:
    name: Publish to PyPI
    needs: checks
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
