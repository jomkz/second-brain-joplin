name: Checks

# Reusable quality-gate workflow: lint, type-check, test matrix, and package
# build/validation. Called by both ci.yml (push/PR) and release.yml (before
# publish) so nothing ships that has not passed the same gates.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit (ruff lint + format)
        run: uvx pre-commit run --all-files --show-diff-on-failure

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Run mypy
        run: uv run mypy

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked
      - name: Run tests (with 90% coverage gate)
        run: uv run pytest --cov-fail-under=90 --tb=short

  build:
    name: Build and validate package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Validate metadata
        run: uvx twine check dist/*
      - name: Smoke-test the built wheel
        run: uvx --from ./dist/*.whl second-brain-joplin --version
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1
