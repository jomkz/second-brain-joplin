name: Labeler

# Applies component:* labels to PRs from the path rules in .github/labeler.yml.
# Runs on pull_request_target so it has a write-scoped token even for fork PRs;
# labeler only reads the changed-file list via the API and never checks out or
# runs PR code, so this is safe. See docs/project-management.md.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply component labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: false  # add-only; never strip maintainer-applied labels
