# Declarative PM spec for second-brain-joplin.
# Applied manually via `gh` CLI or GitHub UI; no automated sync script at this stage.
# See docs/project-management.md for how this spec is used.

labels:
  # component labels
  - name: "component:joplin-api"
    color: "0075ca"
    description: "Joplin REST API client"
  - name: "component:mcp"
    color: "0075ca"
    description: "MCP server and tool definitions"
  - name: "component:search"
    color: "0075ca"
    description: "Semantic search and embeddings"
  - name: "component:docs"
    color: "0075ca"
    description: "Documentation"
  - name: "component:ci"
    color: "0075ca"
    description: "CI/CD and build"
  - name: "component:templates"
    color: "0075ca"
    description: "Joplin note templates"

  # meta labels
  - name: "epic"
    color: "6f42c1"
    description: "Multi-issue initiative"
  - name: "backlog"
    color: "d4c5f9"
    description: "Unscheduled work"
  - name: "needs-triage"
    color: "e11d48"
    description: "Not yet triaged"
  - name: "blocked"
    color: "b60205"
    description: "Blocked by another issue or external dependency"
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers"
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed"

milestones:
  - title: "v0.1 — Bootstrap"
    description: "Repo scaffold, CI, package skeleton"
  - title: "v0.2 — Core Read Tools"
    description: "All read MCP tools working against Joplin REST API"
  - title: "v0.3 — Semantic Search"
    description: "Embedding index and semantic search tool"
  - title: "v0.4 — Write Workflow"
    description: "Human-gated note creation"
  - title: "v1.0 — Publish"
    description: "PyPI release, full docs, Joplin note templates"
