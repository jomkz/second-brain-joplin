name: Bug
description: An unexpected problem or incorrect behavior
labels: ["needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What was expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 0.1.0"
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python version, Joplin version"
