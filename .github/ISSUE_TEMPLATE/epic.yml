name: Epic
description: A large, multi-issue initiative
labels: ["epic", "needs-triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What does this epic accomplish when all sub-issues are closed?
    validations:
      required: true
  - type: textarea
    id: sub-issues
    attributes:
      label: Sub-issues
      description: List the issues that make up this epic (fill in after filing them).
      placeholder: "- [ ] #1\n- [ ] #2"
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this epic is done?
    validations:
      required: true
